name: FEC and Reinjection Performance Tests

# Benchmarks FEC scheme throughput under packet loss and reinjection mode
# throughput under asymmetric/lossy path conditions.
#
# Triggers:
#   - Push to main when FEC/reinjection source files change
#   - Manual dispatch (for on-demand comparisons)
#
# Runs on standard GitHub-hosted ubuntu-latest runners (ephemeral).
# Dependencies installed inline.

on:
  push:
    branches: [main]
    paths:
      - 'src/mqvpn_config.c'
      - 'src/config.c'
      - 'include/libmqvpn.h'
      - 'third_party/xquic/src/transport/xqc_fec.c'
      - 'third_party/xquic/src/transport/xqc_fec.h'
      - 'third_party/xquic/src/transport/fec_schemes/**'
      - 'third_party/xquic/src/transport/xqc_reinjection.c'
      - 'third_party/xquic/src/transport/reinjection_control/**'
      - 'scripts/ci_benchmarks/ci_bench_fec.sh'
      - 'scripts/ci_benchmarks/ci_bench_reinjection.sh'
      - 'scripts/ci_benchmarks/ci_bench_env.sh'
      - '.github/workflows/perf-fec-reinjection.yml'
  workflow_dispatch:


concurrency:
  group: perf-fec-reinjection
  cancel-in-progress: true

jobs:
  perf-fec-reinjection:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake gcc make libevent-dev golang \
            iptables iproute2 iperf3 python3 openssl bc

      - name: Build BoringSSL
        run: |
          git clone https://github.com/google/boringssl.git \
            third_party/xquic/third_party/boringssl
          cd third_party/xquic/third_party/boringssl && git checkout 9c95ec797c65fde9e8ddffc3888f0b8c1460fe4c
          mkdir -p build && cd build
          cmake -DBUILD_SHARED_LIBS=0 -DCMAKE_C_FLAGS="-fPIC" -DCMAKE_CXX_FLAGS="-fPIC" ..
          make -j$(nproc) ssl crypto

      - name: Build xquic
        run: |
          cd third_party/xquic
          mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DSSL_TYPE=boringssl \
                -DXQC_ENABLE_BBR2=ON \
                -DCMAKE_C_FLAGS="-Wno-dangling-pointer" ..
          make -j$(nproc)

      - name: Build mqvpn (Release)
        run: |
          mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DXQUIC_BUILD_DIR=../third_party/xquic/build ..
          make -j$(nproc)

      # ── FEC benchmarks ──

      - name: FEC scheme benchmark (4 schemes × 4 loss levels)
        run: sudo bash scripts/ci_benchmarks/ci_bench_fec.sh build/mqvpn

      # ── Reinjection benchmarks ──

      - name: Reinjection mode benchmark (3 modes × 5 scenarios)
        run: sudo bash scripts/ci_benchmarks/ci_bench_reinjection.sh build/mqvpn

      # ── Artifacts ──

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-fec-reinjection-${{ github.sha }}
          path: ci_bench_results/*.json
          retention-days: 90


