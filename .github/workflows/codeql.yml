name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6:00 UTC

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libevent-dev

      # Cache keys carry a trailing -vN; bump in every job using the same
      # key whenever you change CMake flags or compiler. Keys here are
      # intentionally identical to the ci.yml `build` job so the two
      # workflows can share entries.
      - name: Compute xquic SHA
        id: xqsha
        run: echo "sha=$(git submodule status third_party/xquic | awk '{print $1}' | tr -d '+-')" >> "$GITHUB_OUTPUT"

      - name: Cache BoringSSL (gcc fPIC)
        id: bssl-cache
        uses: actions/cache@v6
        with:
          path: third_party/xquic/third_party/boringssl
          key: bssl-9c95ec7-linux-gcc-fpic-v1

      - name: Clone BoringSSL (pinned)
        if: steps.bssl-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/google/boringssl.git \
            third_party/xquic/third_party/boringssl
          cd third_party/xquic/third_party/boringssl && git checkout 9c95ec797c65fde9e8ddffc3888f0b8c1460fe4c

      - name: Build BoringSSL
        if: steps.bssl-cache.outputs.cache-hit != 'true'
        run: |
          cd third_party/xquic/third_party/boringssl
          mkdir -p build && cd build
          cmake -DBUILD_SHARED_LIBS=0 -DCMAKE_C_FLAGS="-fPIC" -DCMAKE_CXX_FLAGS="-fPIC" ..
          make -j$(nproc) ssl crypto

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          queries: security-and-quality

      # xquic is third-party; we don't analyze it. Skipping the traced
      # build on cache hit is fine — only the mqvpn build below needs to
      # be CodeQL-traced for analysis.
      - name: Cache xquic (Release)
        id: xquic-cache
        uses: actions/cache@v6
        with:
          # See ci.yml "Cache xquic (Release)" comment re: xqc_configure.h
          # — committed FEC=OFF default in source tree must travel with build/.
          path: |
            third_party/xquic/build
            third_party/xquic/include/xquic/xqc_configure.h
          key: xquic-${{ steps.xqsha.outputs.sha }}-linux-gcc-release-bssl-9c95ec7-v3

      - name: Build xquic (CodeQL traced)
        if: steps.xquic-cache.outputs.cache-hit != 'true'
        run: |
          cd third_party/xquic
          mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DSSL_TYPE=boringssl \
                -DXQC_ENABLE_BBR2=ON \
                -DXQC_ENABLE_FEC=ON \
                -DXQC_ENABLE_XOR=ON \
                -DCMAKE_C_FLAGS="-Wno-dangling-pointer" ..
          make -j$(nproc)

      - name: Build mqvpn (CodeQL traced)
        run: |
          mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DXQUIC_BUILD_DIR=../third_party/xquic/build ..
          make -j$(nproc)

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:c-cpp"
